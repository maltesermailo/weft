name: Build and push weftd image

# Builds the weftd container and pushes it to the GitHub Container Registry, in
# two variants: the lean image (embedded web client + voice) and a
# `-voice-relay` image that also bundles the libwebrtc media relay (§16 M-lk-3b)
# for cross-network calls / federated voice. Runs on pushes to the default
# branch, on version tags (v1.2.3), and on manual dispatch.
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to ghcr.io with the built-in token

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute tags/labels: :latest on the default branch, :<version> on a tag,
      # plus :sha-<commit> always. The image name is lowercased automatically.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weft-weftd
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache across runs so the heavy Rust + web build only rebuilds
          # what changed. Scoped so the lean and voice-relay variants don't share
          # (and thrash) the same cache.
          cache-from: type=gha,scope=lean
          cache-to: type=gha,mode=max,scope=lean

  # §16 M-lk-3b: the same image built WITH the libwebrtc media relay
  # (`--build-arg WEFTD_FEATURES=web-ui,voice,voice-relay`), published under a
  # `-voice-relay` tag suffix (e.g. `:latest-voice-relay`, `:v1.2.3-voice-relay`).
  # Cross-network calls / federated voice need this variant to carry audio without
  # exposing a client's IP to the peer network. It's a SEPARATE job (not a step of
  # the lean build) with `continue-on-error`, so a libwebrtc build hiccup — the
  # driver is deployment-verified, not yet CI-proven — never blocks the lean
  # image publish above.
  build-and-push-voice-relay:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same tags as the lean variant, plus a `-voice-relay` suffix on each
      # (including `latest`).
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weft-weftd
          flavor: |
            suffix=-voice-relay,onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push (linux/amd64, voice-relay)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            WEFTD_FEATURES=web-ui,voice,voice-relay
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=voice-relay
          cache-to: type=gha,mode=max,scope=voice-relay
