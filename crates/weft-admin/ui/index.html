<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WEFT Console</title>
<style>
/* ============================================================
   weft.css — WEFT Console design system (embedded).
   Mirrors design/admin/weft.css; keep them in sync.
   ============================================================ */
:root{
  --warp-0:#131519; --warp-1:#1A1D23; --warp-2:#22262F;
  --line:#2C313C; --line-soft:#242832;
  --linen:#E7E2D6; --flax:#8E95A3; --flax-dim:#5C6270;
  --thread:#D9A05B; --thread-dim:#8a6a42;
  --teal:#63A89F; --madder:#C75B52; --amber:#C9A24B;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--warp-0);color:var(--linen);font-family:var(--sans);font-size:14px;line-height:1.5;display:flex}
::selection{background:var(--thread-dim);color:var(--linen)}

.selvage{width:6px;flex:none;background:repeating-linear-gradient(180deg,var(--thread) 0 8px,var(--warp-2) 8px 16px,var(--teal) 16px 24px,var(--warp-2) 24px 32px);opacity:.55}

aside{width:232px;flex:none;background:var(--warp-1);border-right:1px solid var(--line-soft);display:flex;flex-direction:column;overflow-y:auto}
.wordmark{padding:20px 18px 16px;border-bottom:1px solid var(--line-soft)}
.wordmark .weave{font-family:var(--mono);font-size:19px;font-weight:700;letter-spacing:.28em;color:var(--linen)}
.wordmark .weave b{color:var(--thread);font-weight:700}
.wordmark .sub{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--flax-dim);margin-top:3px}
nav{padding:10px 0 24px}
.nav-group{margin-top:14px}
.nav-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--flax-dim);padding:0 18px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 18px;color:var(--flax);cursor:pointer;border:0;background:none;width:100%;text-align:left;font-family:var(--sans);font-size:13.5px;border-left:2px solid transparent;text-decoration:none}
.nav-item:hover{background:var(--warp-2);color:var(--linen)}
.nav-item.active{background:var(--warp-2);color:var(--linen);border-left-color:var(--thread)}
.nav-item .tick{font-family:var(--mono);font-size:11px;color:var(--flax-dim);width:10px}
.nav-item.active .tick{color:var(--thread)}
.nav-item:focus-visible{outline:2px solid var(--thread);outline-offset:-2px}
.nav-item .soon-tag{margin-left:auto;font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:var(--flax-dim);border:1px solid var(--line-soft);border-radius:3px;padding:1px 4px}
.nav-item.soon{opacity:.6}

main{flex:1;display:flex;flex-direction:column;min-width:0}
header{height:58px;flex:none;background:var(--warp-1);display:flex;align-items:center;gap:14px;padding:0 22px;position:relative}
header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:repeating-linear-gradient(90deg,var(--thread) 0 14px,transparent 14px 20px,var(--teal) 20px 34px,transparent 34px 40px);opacity:.5}
.op-ident{display:flex;align-items:center;gap:11px}
.op-avatar{width:32px;height:32px;border-radius:50%;background:repeating-linear-gradient(45deg,var(--thread-dim) 0 3px,var(--warp-2) 3px 6px);border:1px solid var(--line)}
.op-name{font-weight:600;font-size:13.5px}
.op-addr{font-family:var(--mono);font-size:11px;color:var(--flax)}
.op-role{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--thread);border:1px solid var(--thread-dim);border-radius:3px;padding:2px 7px;text-transform:uppercase}
header .spacer{flex:1}

.btn{font-family:var(--sans);font-size:13px;font-weight:600;background:var(--warp-2);color:var(--linen);border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{border-color:var(--flax-dim)}
.btn:focus-visible{outline:2px solid var(--thread);outline-offset:1px}
.btn.primary{background:var(--thread);border-color:var(--thread);color:#1a1408}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{background:transparent;border-color:var(--madder);color:var(--madder)}
.btn.danger:hover{background:var(--madder);color:#1a0c0a}
.btn.danger.solid{background:var(--madder);color:#1a0c0a}
.btn.small{padding:4px 10px;font-size:12px}

.content{flex:1;overflow-y:auto;padding:30px 34px 60px}
.content-inner{max-width:940px;margin:0 auto}
h1{font-size:22px;font-weight:700;letter-spacing:-.01em}
.h-row{display:flex;align-items:baseline;gap:14px;margin-bottom:20px}
.h-row .meta{font-family:var(--mono);font-size:11.5px;color:var(--flax-dim);margin-left:auto}
.h-row .id{font-family:var(--mono);font-size:12px;color:var(--flax-dim)}
.crumb{font-family:var(--mono);font-size:11.5px;color:var(--flax);background:none;border:0;cursor:pointer;padding:0;margin-bottom:14px;display:inline-block;text-decoration:none}
.crumb:hover{color:var(--thread)}

.card{background:var(--warp-1);border:1px solid var(--line-soft);border-radius:8px;margin-bottom:18px;overflow:hidden}
.card-h{padding:14px 18px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px}
.card-h h2{font-size:14.5px;font-weight:700}
.card-h .shuttle{width:14px;height:3px;background:var(--thread);border-radius:2px;flex:none}
.card-h .count{font-family:var(--mono);font-size:11px;color:var(--flax-dim)}
.card-b{padding:16px 18px}
.kv{display:grid;grid-template-columns:170px 1fr;gap:0}
.kv > div{padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.kv > div:nth-last-child(-n+2){border-bottom:0}
.kv .k{color:var(--flax)}
.kv .v{color:var(--linen)}
.kv .v.mono,.mono{font-family:var(--mono);font-size:12.5px}
.kv .v .dim{color:var(--flax-dim)}
.ok{color:var(--teal)} .warn{color:var(--amber)} .bad{color:var(--madder)}

.search-row{display:flex;gap:10px;margin-bottom:18px}
input[type=text],input[type=search],input[type=email],input[type=password],input[type=number],select,textarea{flex:1;background:var(--warp-1);border:1px solid var(--line);border-radius:6px;color:var(--linen);font-family:var(--mono);font-size:13px;padding:10px 13px;width:100%}
input::placeholder,textarea::placeholder{color:var(--flax-dim)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--thread)}

.result{display:flex;align-items:center;gap:16px;padding:16px 18px}
.result + .result{border-top:1px solid var(--line-soft)}
.r-avatar{width:46px;height:46px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:14px;color:var(--warp-0);background:repeating-linear-gradient(135deg,var(--teal) 0 4px,var(--thread) 4px 8px)}
.r-avatar.u{background:repeating-linear-gradient(135deg,var(--thread) 0 4px,var(--warp-2) 4px 8px);color:var(--linen)}
.r-main{flex:1;min-width:0}
.r-name{font-weight:700;font-size:14.5px}
.r-sub{font-family:var(--mono);font-size:11.5px;color:var(--flax);margin-top:2px}
.r-sub span{margin-right:14px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--flax-dim);padding:10px 18px;border-bottom:1px solid var(--line-soft);font-weight:600}
td{padding:11px 18px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
tr:last-child td{border-bottom:0}
tr:hover td{background:var(--warp-2)}
tr.rowlink{cursor:pointer}
td.actions{text-align:right;white-space:nowrap}
.fp{font-family:var(--mono);font-size:11.5px;color:var(--flax);letter-spacing:.03em}

.knot{display:inline-flex;align-items:center;gap:7px;font-size:12.5px}
.knot::before{content:"";width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 3px var(--warp-1),0 0 0 4px currentColor;background:currentColor;transform:scale(.8)}
.knot.woven{color:var(--teal)} .knot.frayed{color:var(--amber)} .knot.severed{color:var(--madder)} .knot.idle{color:var(--flax-dim)}

.flags{display:grid;grid-template-columns:1fr 1fr;gap:2px 30px}
.flag{display:flex;align-items:center;gap:10px;padding:6px 0;font-family:var(--mono);font-size:12px;color:var(--flax)}

/* WC2 permission picker: one togglable row per admin scope. */
.perms{display:flex;flex-direction:column;gap:2px;margin:4px 0 2px}
.perm{display:flex;align-items:flex-start;gap:11px;padding:9px 11px;border:1px solid var(--line-soft);border-radius:4px;cursor:pointer;background:var(--warp-1)}
.perm:hover{border-color:var(--line)}
.perm.on{border-color:var(--thread)}
.perm input{margin-top:2px;accent-color:var(--thread);cursor:pointer;flex:none}
.perm-t{display:flex;flex-direction:column;gap:2px;min-width:0}
.perm-n{font-size:13px;font-weight:600;color:var(--linen)}
.perm-d{font-size:12px;color:var(--flax)}

.action{padding:16px 18px;border-bottom:1px solid var(--line-soft)}
.action:last-child{border-bottom:0}
.action h3{font-size:13.5px;font-weight:700;margin-bottom:4px}
.action p{font-size:12.5px;color:var(--flax);margin-bottom:11px;max-width:560px}
.action .row{display:flex;gap:10px;flex-wrap:wrap}
.action.danger h3{color:var(--madder)}

.pill{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--teal);border:1px solid #2f4b47;background:#1a2422;border-radius:4px;padding:2px 8px;margin:0 6px 6px 0}
.pill.gold{color:var(--thread);border-color:#4b3d26;background:#241f16}
.pill.neutral{color:var(--flax);border-color:var(--line);background:var(--warp-2)}
.pill.warn{color:var(--amber);border-color:#4b3d26;background:#241f16}
.pill.bad{color:var(--madder);border-color:#4b2f2c;background:#241816}

.pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px;font-family:var(--mono);font-size:11.5px;color:var(--flax-dim)}
.placeholder{border:1px dashed var(--line);border-radius:8px;padding:40px;text-align:center;color:var(--flax-dim);font-family:var(--mono);font-size:12.5px}

/* ---- entity detail pages (design/admin/weft-admin.html) ---- */
/* profile header */
.profile{display:flex;align-items:flex-start;gap:18px;margin-bottom:24px}
.p-avatar{width:74px;height:74px;border-radius:50%;flex:none;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:18px;background:repeating-linear-gradient(45deg,var(--thread-dim) 0 4px,var(--warp-2) 4px 8px)}
.p-avatar.g{background:var(--warp-2);border-radius:12px}
.p-name{font-size:21px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.p-name .crown{color:var(--thread);font-size:14px}
.p-sub{font-family:var(--mono);font-size:12px;color:var(--flax);margin-top:2px;line-height:1.8}
.p-owner{margin-left:auto;text-align:left}
.p-owner .k{font-size:12.5px;color:var(--flax)}
.p-owner .v{font-size:13.5px}

/* sub-nav + panel */
.detail{display:grid;grid-template-columns:180px 1fr;gap:26px;align-items:start}
.subnav{border-left:1px solid var(--line-soft);position:sticky;top:0}
.subnav button{display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;font-family:var(--sans);font-size:13.5px;color:var(--flax);padding:8px 14px;border-left:2px solid transparent;margin-left:-1px}
.subnav button:hover{color:var(--linen)}
.subnav button.active{color:var(--linen);border-left-color:var(--thread);font-weight:600}
.subnav button .n{font-family:var(--mono);font-size:10.5px;color:var(--flax-dim);margin-left:6px}

/* action cards (the controls) */
.action-card{background:var(--warp-1);border:1px solid var(--line-soft);border-radius:8px;margin-bottom:18px;padding:16px 18px}
.action-card h2{font-size:15px;font-weight:700;margin-bottom:12px}
.action-card p{font-size:12.5px;color:var(--flax);margin-bottom:12px;max-width:600px}
.action-card .row{display:flex;flex-direction:column;gap:10px;align-items:stretch}
.action-card .row .btns{display:flex;gap:10px;flex-wrap:wrap}
.action-card.danger{border-color:#4a2b28}
.action-card.danger h2{color:var(--madder)}

/* entity row lists */
.rowlist > div{display:flex;align-items:center;gap:11px;background:var(--warp-2);border:1px solid var(--line-soft);border-radius:6px;padding:10px 14px;margin-bottom:10px}
.rowlist > div:last-child{margin-bottom:0}
.rowlist .rl-main{min-width:0}
.rl-main .n{font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-main .i{font-family:var(--mono);font-size:11.5px;color:var(--flax-dim)}
.rl-type{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--flax);flex:none}
.rl-act{margin-left:auto;display:flex;gap:8px;flex:none}
.rl-act + .rl-type{margin-left:0}
.swatch{width:13px;height:13px;border-radius:3px;background:#111;border:1px solid var(--line);flex:none}
.badge{display:inline-block;font-size:12px;background:var(--warp-2);border:1px solid var(--line);border-radius:20px;padding:3px 12px;margin-right:8px;color:var(--flax)}

@media (max-width:900px){
  .detail{grid-template-columns:1fr}
  .subnav{display:flex;flex-wrap:wrap;border-left:0}
  .subnav button{width:auto;border-left:0;border-bottom:2px solid transparent}
  .subnav button.active{border-left-color:transparent;border-bottom-color:var(--thread)}
}

@media (prefers-reduced-motion:no-preference){
  .view-enter{animation:rise .18s ease-out}
  @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
@media (max-width:860px){aside{width:190px}.kv{grid-template-columns:130px 1fr}.flags{grid-template-columns:1fr}}

/* ---- SPA additions (not part of the static design pack) ---- */
.hidden{display:none!important}
#login{position:fixed;inset:0;z-index:20;background:var(--warp-0);display:grid;place-items:center}
#login .selvage{position:fixed;left:0;top:0;bottom:0}
#login form{width:min(360px,90vw);background:var(--warp-1);border:1px solid var(--line-soft);border-radius:10px;padding:26px 24px;display:flex;flex-direction:column;gap:12px}
#login .weave{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:.28em;margin-bottom:2px}
#login .weave b{color:var(--thread)}
#login .sub{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--flax-dim);margin-bottom:10px}
.err{color:var(--madder);font-size:12.5px;min-height:1em}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.form-row .grow{flex:1;min-width:140px}
.form-row select{max-width:150px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--warp-1);border:1px solid var(--line-soft);border-radius:8px;padding:15px 16px}
.stat .n{font-size:26px;font-weight:700;line-height:1.05}
.stat .l{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--flax-dim);margin-top:5px}
.chips{display:flex;flex-wrap:wrap;gap:5px 0}
.msg{background:var(--warp-1);border:1px solid var(--line-soft);border-radius:8px;padding:10px 13px;margin-bottom:8px}
.msg.reported{border-color:var(--thread-dim)}
.msg .h{font-family:var(--mono);font-size:11px;color:var(--flax);margin-bottom:4px}
.msg .del{color:var(--madder);font-style:italic}
.msg .react{margin-top:5px;font-size:11px;color:var(--flax-dim)}
.sub-note{color:var(--flax);font-size:12.5px;margin-bottom:18px;max-width:640px}
.hint{font-family:var(--mono);font-size:11px;color:var(--flax-dim)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="selvage" aria-hidden="true"></div>

<aside id="side" class="hidden">
  <div class="wordmark">
    <div class="weave">W<b>E</b>FT</div>
    <div class="sub">weft console</div>
  </div>
  <nav id="nav" aria-label="Admin sections"></nav>
</aside>

<main id="app" class="hidden">
  <header>
    <div class="op-ident">
      <div class="op-avatar" aria-hidden="true"></div>
      <div>
        <div class="op-name" id="opName"></div>
        <div class="op-addr" id="opAddr"></div>
      </div>
    </div>
    <span id="role"></span>
    <div class="spacer"></div>
    <button class="btn" id="logout">Sign out</button>
  </header>
  <div class="content">
    <div class="content-inner view-enter" id="main"></div>
  </div>
</main>

<div id="login">
  <div class="selvage" aria-hidden="true"></div>
  <form id="loginForm">
    <div class="weave">W<b>E</b>FT</div>
    <div class="sub">weft console · operator sign-in</div>
    <input type="text" id="acct" placeholder="operator account" autocomplete="username" />
    <input type="password" id="pw" placeholder="password" autocomplete="current-password" />
    <button class="btn primary" type="submit">Sign in</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<script>
const API = "/admin/api/v1";
const $ = (sel, root = document) => root.querySelector(sel);
const main = () => $("#main");
const set = (html) => { main().innerHTML = html; main().classList.remove("view-enter"); void main().offsetWidth; main().classList.add("view-enter"); };
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const when = (ms) => (ms ? new Date(ms).toLocaleString() : "—");
const short = (s) => { s = String(s ?? ""); return s.length > 14 ? s.slice(0, 10) + "…" : s; };
const pill = (s, cls = "") => `<span class="pill ${cls}">${esc(s)}</span>`;

// The current detail view re-renders itself after a mutation.
let refresh = () => {};

// WC2 RBAC: the scopes the logged-in admin holds (from /me). The server
// enforces regardless; the SPA hides controls it can't use.
let SCOPES = [];
const can = (scope) => SCOPES.includes(scope);
const readonlyNote = (scope) => `<div class="placeholder">Read-only — you don't hold <span class="mono">${scope}</span>.</div>`;

async function api(path, opts = {}) {
  const res = await fetch(API + path, { credentials: "same-origin", headers: { "Content-Type": "application/json" }, ...opts });
  if (res.status === 401) { showLogin(); throw new Error("unauthorized"); }
  if (!res.ok) throw new Error((await res.text()) || res.statusText);
  return res.status === 204 ? null : res.json();
}

// Shared renderers ----------------------------------------------------------
const hrow = (title, meta) => `<div class="h-row"><h1>${title}</h1>${meta != null ? `<span class="meta">${meta}</span>` : ""}</div>`;
const note = (t) => `<p class="sub-note">${t}</p>`;
const act = (html) => ({ h: html, cls: "actions" });

// rows: [{ cells:[html | {h,cls}], action?, id? }]
function table(cols, rows, actionsCol = false) {
  if (!rows.length) return `<div class="card-b"><div class="placeholder">Nothing here yet.</div></div>`;
  const head = cols.map((c) => `<th>${c}</th>`).join("") + (actionsCol ? "<th></th>" : "");
  const body = rows.map((r) =>
    `<tr class="${r.action ? "rowlink" : ""}"${r.action ? ` data-action="${r.action}" data-id="${esc(r.id)}"` : ""}>` +
    r.cells.map((c) => `<td class="${c.cls || ""}">${c.h ?? c}</td>`).join("") + `</tr>`).join("");
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
// A card wrapping a full-bleed table.
const cardTable = (title, count, cols, rows, actionsCol = false) =>
  `<div class="card"><div class="card-h"><span class="shuttle"></span><h2>${title}</h2>${count != null ? `<span class="count">${count}</span>` : ""}</div>${table(cols, rows, actionsCol)}</div>`;
// A card wrapping arbitrary padded body content.
const card = (title, bodyHtml, count) =>
  `<div class="card"><div class="card-h"><span class="shuttle"></span><h2>${title}</h2>${count != null ? `<span class="count">${count}</span>` : ""}</div><div class="card-b">${bodyHtml}</div></div>`;

const capChips = (caps) => `<div class="chips">${(caps || []).map((c) => pill(c)).join("")}</div>`;

// ---- entity detail framework (design/admin/weft-admin.html) ----------------
// Every entity — user, namespace, channel, DM — renders the same shape: a
// profile header, a sticky sub-nav of sub-pages, and the active panel. The tab
// lives in module state keyed by entity so re-renders (after an action) keep
// their place instead of bouncing back to Overview.
const TAB = {};
const initials = (s) => (s || "?").replace(/[^a-zA-Z0-9]/g, "").slice(0, 2).toUpperCase() || "?";

/** profile: {avatar, avatarClass, name, badges, sub, aside} */
function profileHead(p) {
  return `<div class="profile">
    <div class="p-avatar ${p.avatarClass || ""}" aria-hidden="true">${esc(p.avatar)}</div>
    <div>
      <div class="p-name">${esc(p.name)}${p.badges || ""}</div>
      <div class="p-sub">${p.sub || ""}</div>
    </div>
    ${p.aside ? `<div class="p-owner">${p.aside}</div>` : ""}
  </div>`;
}

/**
 * Render an entity detail page.
 *  key    — entity kind, the TAB state key (e.g. "user")
 *  crumb  — {label, view}
 *  tabs   — [[id, label, count?]]
 *  panel  — (tabId) => html
 */
function detailPage({ key, crumb, profile, tabs, panel }) {
  const ids = tabs.map(([id]) => id);
  if (!ids.includes(TAB[key])) TAB[key] = ids[0];
  const active = TAB[key];
  const nav = tabs.map(([id, label, count]) =>
    `<button class="${id === active ? "active" : ""}" data-action="tab" data-x="${key}" data-id="${id}">${esc(label)}${
      count != null ? `<span class="n">${count}</span>` : ""}</button>`).join("");
  set(
    `<a class="crumb" data-action="back" data-x="${crumb.view}">← ${esc(crumb.label)}</a>` +
    profileHead(profile) +
    `<div class="detail"><div class="subnav">${nav}</div><div>${panel(active)}</div></div>`
  );
}

/** An action card: title, explanation, and its controls. */
const actionCard = (title, desc, controls, danger = false) =>
  `<div class="action-card ${danger ? "danger" : ""}"><h2>${title}</h2>${
    desc ? `<p>${desc}</p>` : ""}<div class="row">${controls}</div></div>`;

/** A row list (channels, roles, members, conversations). */
const rowList = (rows) => rows.length
  ? `<div class="card-b rowlist">${rows.map((r) =>
      `<div>${r.lead || ""}<div class="rl-main"><div class="n">${r.name}</div>${
        r.sub ? `<div class="i">${r.sub}</div>` : ""}</div>${
        r.actions ? `<span class="rl-act">${r.actions}</span>` : ""}${
        r.type ? `<span class="rl-type">${esc(r.type)}</span>` : ""}</div>`).join("")}</div>`
  : `<div class="card-b"><div class="placeholder">Nothing here yet.</div></div>`;

const rowListCard = (title, rows, count) =>
  `<div class="card"><div class="card-h"><span class="shuttle"></span><h2>${title}</h2>${
    count != null ? `<span class="count">${count}</span>` : ""}</div>${rowList(rows)}</div>`;

/** Read-only note shown in place of controls the session can't use. */
const noPerm = (scope) => `<div class="placeholder">Read-only — you don't hold <span class="mono">${scope}</span>.</div>`;

const delBtn = (msgid) => can("admin.destroy") ? `<button class="btn small danger" data-action="delMsg" data-id="${esc(msgid)}" style="float:right">delete</button>` : "";
function msgCard(m, reported = false) {
  if (m.deleted) return `<div class="msg"><span class="del">deleted by ${esc(m.by)}</span></div>`;
  const reacts = (m.reactions || []).map((r) => `${esc(r.emoji)} ${r.count}`).join("   ");
  return `<div class="msg ${reported ? "reported" : ""}"><div class="h">${esc(m.sender)} · ${when(m.at_ms)}${m.edited ? " · edited" : ""}${delBtn(m.msgid)}</div>${esc(m.body)}${reacts ? `<div class="react">${reacts}</div>` : ""}</div>`;
}
const placeholder = (title, milestone, what) =>
  set(hrow(esc(title)) + `<div class="placeholder">${esc(what)}<br><br>Ships in <b>${esc(milestone)}</b> — this screen is part of the planned WEFT Console but its server surface isn't built yet.</div>`);

// Users list (client-filtered result rows) ----------------------------------
let ALL_USERS = [];
/// Namespaces, cached so a user's detail can show what they own without a
/// per-user query; refreshed whenever the Namespaces screen loads.
let ALL_NS = [];
/// The user-detail payload currently on screen (its tabs read from one fetch).
let USER_CTX = null;

/// Apply a moderation verb at an explicit scope, from an entity's page.
async function applyMod(verb, scope, account, reasonEl) {
  if (!account) { alert("Enter an account first."); return; }
  const reason = (reasonEl?.value || "").trim() || null;
  if (!confirm(`${verb} ${account} at ${scope}?`)) return;
  try {
    await api("/moderation", { method: "POST", body: JSON.stringify({ verb, scope, account, reason }) });
    refresh();
  } catch (e) { alert(e.message); }
}
function renderUsers(q) {
  const list = ALL_USERS.filter((u) => !q || u.account.toLowerCase().includes(q));
  if (!list.length) { $("#userList").innerHTML = `<div class="card-b"><div class="placeholder">No accounts match "${esc(q)}".</div></div>`; return; }
  $("#userList").innerHTML = list.map((u) => {
    const initials = esc(u.account.slice(0, 2).toUpperCase());
    const state = u.suspended ? `<span class="knot severed">suspended</span>` : u.deletion_scheduled ? `<span class="knot severed">pending delete</span>` : u.banned ? `<span class="knot severed">banned</span>` : u.muted ? `<span class="knot frayed">muted</span>` : `<span class="knot woven">active</span>`;
    const tags = `${u.operator ? pill("operator", "gold") : ""}${(u.caps || []).map((c) => pill(c)).join("")}`;
    return `<div class="result">
      <div class="r-avatar u">${initials}</div>
      <div class="r-main">
        <div class="r-name">${esc(u.account)}</div>
        <div class="r-sub"><span>${esc(short(u.ulid))}</span>${tags ? `<span>${tags}</span>` : ""}</div>
      </div>
      ${state}
      <button class="btn small" data-action="user" data-id="${esc(u.account)}">View details</button>
    </div>`;
  }).join("");
}

// Detail views + actions ----------------------------------------------------
async function openReport(id) {
  refresh = () => openReport(id);
  const d = await api("/reports/" + encodeURIComponent(id));
  const r = d.report;
  const ctx = (d.context || []).map((m) => msgCard(m, m.msgid === d.reported_msgid)).join("")
    || `<div class="placeholder">Content unavailable — expired, purged, or e2ee (never reconstructed).</div>`;
  const btns = ["dismissed", "content-removed", "user-actioned", "escalated"]
    .map((a) => `<button class="btn" data-action="resolve" data-id="${esc(id)}" data-x="${a}">${a}</button>`).join("");
  const resolve = can("admin.moderate")
    ? card("Resolve", `<div class="btn-row">${btns}</div>`)
    : card("Resolve", readonlyNote("admin.moderate"));
  set(`<a class="crumb" data-action="back" data-x="reports">← back to Reports</a>` +
    hrow(`${esc(r.category)} ${pill(r.status, "neutral")}`, esc(r.scope)) +
    note(`Reported by ${esc(r.reporter)} · ${when(r.filed_at_ms)}${r.note ? " · " + esc(r.note) : ""}`) +
    card("Reported message + context", ctx) +
    resolve);
}

function userMsgCard(m) {
  return `<div class="msg"><div class="h"><span class="mono">${esc(m.scope)}</span> · ${when(m.at_ms)}${delBtn(m.msgid)}</div>${esc(m.body)}</div>`;
}

async function openUser(name) {
  refresh = () => openUser(name);
  const [u, msgs, dms] = await Promise.all([
    api("/accounts/" + encodeURIComponent(name)),
    api("/accounts/" + encodeURIComponent(name) + "/messages?limit=200").catch(() => []),
    api("/accounts/" + encodeURIComponent(name) + "/dms").catch(() => []),
  ]);
  USER_CTX = { u, msgs, dms };
  const email = (u.verifications || []).find((v) => v.kind === "email");
  const flag = (n, on) => `<label class="flag ${on ? "on" : ""}"><span class="box"></span>${n}</label>`;
  const state = `${u.operator ? pill("operator", "gold") : ""}${u.suspended ? pill("suspended", "bad") : ""}${
    u.banned ? pill("banned", "bad") : ""}${u.muted ? pill("muted", "warn") : ""}${
    u.deletion_scheduled ? pill("pending delete", "bad") : ""}`;

  detailPage({
    key: "user",
    crumb: { label: "Back to Users", view: "users" },
    profile: {
      avatar: initials(u.account),
      name: u.account,
      badges: u.operator ? `<span class="crown" title="Operator">♛</span>` : "",
      sub: `${esc(u.account)}@${esc(WHO.network)}<br>${esc(u.ulid)}`,
      aside: `<div class="k">State</div><div class="v">${state || '<span class="dim">nominal</span>'}</div>`,
    },
    tabs: [
      ["overview", "Overview"],
      ["account", "Account"],
      ["namespaces", "Namespaces"],
      ["channels", "Channels", (u.memberships || []).length],
      ["dms", "DM History", dms.length],
      ["perms", "Roles & Grants", (u.grants || []).length],
      ["devices", "Devices", (u.devices || []).length],
      ["messages", "Messages", msgs.length],
      ["moderation", "Moderation"],
      ["danger", "Danger Zone"],
    ],
    panel: (tab) => {
      if (tab === "overview") {
        return card("Account Information", `<div class="kv">
            <div class="k">Account</div><div class="v mono">${esc(u.account)}@${esc(WHO.network)}</div>

          actionCard("Force logout", "Closes every device connected right now. The account can sign straight back in — pair with Suspend to keep it out.",
            `<div class="btns"><button class="btn" data-action="disconnectUser" data-id="${esc(u.account)}">Disconnect all devices</button></div>`) +
          actionCard("Network moderation", "Mute or ban at network scope (<span class=\"mono\">*</span>). Use a channel or namespace scope from that entity's page for narrower action.",
            `<input type="text" id="uModReason" placeholder="reason (optional)" />
             <div class="btns">
               <button class="btn" data-action="modUser" data-id="${esc(u.account)}" data-x="mute">Mute</button>

        "Schedules a hard delete after a grace window, recoverable until then. Type the exact account name to confirm.",
        `<input type="text" id="delConfirm" placeholder="Type ${esc(u.account)} to confirm" aria-label="Type the exact name to confirm deletion" />
         <div class="btns"><button class="btn danger solid" data-action="delUser" data-id="${esc(u.account)}">Delete account</button></div>`, true);
    },
  });
}

// ---- WC2 permissions -------------------------------------------------------
const ADMIN_SCOPES = [
  ["admin.read", "Read", "Every read view. The baseline — required for any panel access."],
  ["admin.moderate", "Moderate", "Mute/ban/kick, resolve reports, suspend accounts, media blocks."],
  ["admin.destroy", "Destroy", "Irreversible: delete accounts and messages."],
  ["admin.federation", "Federation", "Netblocks and peer controls."],
  ["admin.keys", "Keys", "Device, token and revocation management."],
];

/// The account's delegated admin scopes, read off its `admin`-scope grant.
function adminScopesOf(u) {
  const g = (u.grants || []).find((g) => g.scope === "admin");
  if (!g) return [];
  if (g.caps.some((c) => c === "*" || c === "admin.*")) return ADMIN_SCOPES.map(([id]) => id);
  return g.caps.filter((c) => ADMIN_SCOPES.some(([id]) => id === c));
}

function permissionCard(account, operator, held) {
  if (operator) {
    return card("Panel permissions", `<div class="action">
      <h3>Operator</h3>
      <p>Holds <b>every</b> admin scope implicitly, and is the only role that can change other accounts' permissions. Demote to manage its scopes individually.</p>
      <div class="chips">${ADMIN_SCOPES.map(([id]) => pill(id, "gold")).join("")}</div>
      <div class="row" style="margin-top:12px"><button class="btn danger" data-action="demote" data-id="${esc(account)}">Demote to regular admin</button></div>
    </div>`);
  }
  // `admin.read` is locked on while any other scope is held — it's the panel
  // baseline, so a set without it could not sign in (same rule server-side).
  const othersHeld = held.some((h) => h !== "admin.read");
  const boxes = ADMIN_SCOPES.map(([id, label, desc]) => {
    const baseline = id === "admin.read";
    const on = held.includes(id) || (baseline && othersHeld);
    return `<label class="perm ${on ? "on" : ""}">
       <input type="checkbox" class="permBox" value="${id}" ${on ? "checked" : ""} ${baseline ? 'data-baseline="1"' : ""} ${baseline && othersHeld ? "disabled" : ""} />
       <span class="perm-t"><span class="perm-n">${esc(label)} <span class="mono dim">${esc(id)}</span></span><span class="perm-d">${esc(desc)}</span></span>
     </label>`;
  }).join("");
  return card("Panel permissions", `<div class="action">
    <p class="hint">Tick the scopes this account may use in the panel. Saving replaces its whole set; unticking everything removes panel access. <b>Read</b> is added automatically whenever any other scope is held.</p>
    <div class="perms">${boxes}</div>
    <div class="row" style="margin-top:12px">
      <button class="btn solid" data-action="saveScopes" data-id="${esc(account)}">Save permissions</button>
      <button class="btn" data-action="promote" data-id="${esc(account)}">Promote to operator</button>
    </div>
  </div>`, held.length || undefined);
}

async function openPeer(name) {
  refresh = () => openPeer(name);
  const p = await api("/peers/" + encodeURIComponent(name) + "/detail");
  const stateKnot = p.severed ? `<span class="knot severed">severed</span>` : p.acked ? `<span class="knot woven">woven</span>` : `<span class="knot idle">pending</span>`;
  const kv = card("Peer", `<div class="kv">
    <div class="k">Scope</div><div class="v mono">${esc(p.scope)}</div>
    <div class="k">State</div><div class="v">${stateKnot}</div>
    <div class="k">Manifest version</div><div class="v mono">${p.version}</div>
    <div class="k">Acked</div><div class="v">${p.acked ? "yes" : '<span class="warn">not yet</span>'}</div>
    <div class="k">First seen</div><div class="v mono">${when(p.created_ms)}</div>
    <div class="k">Updated</div><div class="v mono">${when(p.updated_ms)}</div>
    <div class="k">Netblocked</div><div class="v">${p.netblocked ? '<span class="bad">yes</span>' : "no"}</div>
  </div>`);

  let manifest;
  if (p.manifest) {
    const m = p.manifest;
    manifest = card("Signed manifest", `<div class="kv">
      <div class="k">Pinned key</div><div class="v"><span class="fp">${esc(m.key_fingerprint)}</span> ${m.verified ? '<span class="ok">verified</span>' : '<span class="bad">unverified</span>'}</div>
      <div class="k">History</div><div class="v mono">${esc(m.history)}</div>
      <div class="k">Media</div><div class="v mono">${esc(m.media)}</div>
      <div class="k">Typing / Voice</div><div class="v mono">${m.typing ? "typing" : "—"}${m.voice ? " · voice" : ""}</div>
    </div>`) +
      cardTable("Shared channels", m.channels.length, ["Channel"], m.channels.map((c) => ({ cells: [`<span class="mono">${esc(c)}</span>`] })));
  } else {
    manifest = card("Signed manifest", `<div class="placeholder">No parseable manifest on record.</div>`);
  }

  // Sever / re-weave via netblock (§11.6) — the real peer-sever mechanism.
  let actions = "";
  if (can("admin.federation")) {
    actions = card("Federation control", p.netblocked
      ? `<div class="action"><h3>Re-weave (unblock)</h3><p>Remove the network block so this peer can bridge again (§11.6).</p><div class="row"><button class="btn" data-action="reweavePeer" data-id="${esc(p.peer)}">Re-weave</button></div></div>`
      : `<div class="action danger"><h3>Sever (netblock)</h3><p>Netblock this peer network: reject its bridge auth + proposals, sever manifests, and drop its ingestion (§11.6, invariant 7).</p><div class="row"><button class="btn danger" data-action="severPeer" data-id="${esc(p.peer)}">Sever</button></div></div>`);
  }

  set(`<a class="crumb" data-action="back" data-x="peers">← back to Peers</a>` +
    hrow(esc(p.peer), esc(p.scope)) + kv + manifest + actions);
}

             <input type="text" id="nsModReason" placeholder="reason (optional)" />
             <div class="btns">
               <button class="btn" data-action="modNs" data-id="${esc(n.name)}" data-x="mute">Mute</button>
               <button class="btn" data-action="modNs" data-id="${esc(n.name)}" data-x="unmute">Unmute</button>
               <button class="btn danger" data-action="modNs" data-id="${esc(n.name)}" data-x="ban">Ban</button>
               <button class="btn" data-action="modNs" data-id="${esc(n.name)}" data-x="unban">Unban</button>
             </div>`);
      }
      if (!IS_OPERATOR) return noPerm("operator");
      return actionCard("Operator takeover",
        "§2.4 rung 3. Seizes the namespace immediately — no delay and nothing to cancel — rotating the root key and handing ownership to the account you name. It is announced to members and permanently marked operator-initiated in <span class=\"mono\">root-history</span>. Requires the network signing key, so it runs server-side.",
        `<input type="text" id="nsTakeover" placeholder="new owner account" />
         <div class="btns"><button class="btn danger solid" data-action="nsTakeover" data-id="${esc(n.name)}">Take over namespace</button></div>`, true);
    },
  });
}

async function openDm(a, b) {
  refresh = () => openDm(a, b);
  const t = await api(`/dms/${encodeURIComponent(a)}/${encodeURIComponent(b)}/messages?limit=200`);
  detailPage({
    key: "dm",
    crumb: { label: "Back to Messages", view: "messages" },
    profile: {
      avatar: "DM",
      avatarClass: "g",
      name: `${t.participants[0]} ↔ ${t.participants[1]}`,
      sub: `policy: ${esc(t.policy)}<br>${t.unavailable ? "unavailable by policy" : `${t.messages.length} messages`}`,
      aside: `<div class="k">Participants</div><div class="v">
        <button class="btn small" data-action="user" data-id="${esc(t.participants[0])}">${esc(t.participants[0])}</button>
        <button class="btn small" data-action="user" data-id="${esc(t.participants[1])}">${esc(t.participants[1])}</button></div>`,
    },
    tabs: [["overview", "Overview"], ["messages", "Messages", t.unavailable ? null : t.messages.length]],
    panel: (tab) => {
      if (tab === "overview") {
        return card("Conversation", `<div class="kv">
          <div class="k">Participants</div><div class="v mono">${esc(t.participants[0])}, ${esc(t.participants[1])}</div>
          <div class="k">Retention policy</div><div class="v mono">${esc(t.policy)}</div>
          <div class="k">Readable</div><div class="v">${t.unavailable ? '<span class="warn">no — e2ee, the server holds no plaintext</span>' : '<span class="ok">yes</span>'}</div>
          <div class="k">Messages</div><div class="v mono">${t.unavailable ? "—" : t.messages.length}</div>
        </div>`);
      }
      if (t.unavailable) {
        return card("Messages", `<div class="placeholder">Unavailable by policy — this conversation is <span class="mono">e2ee</span>, so no plaintext is held or materialized (invariant 8).</div>`);
      }
      return card("Messages", t.messages.length ? t.messages.map((m) => msgCard(m)).join("") : `<div class="placeholder">No messages.</div>`, t.messages.length);
    },
  });
}

async function inspectTokens() {
  const raw = ($("#tokIn")?.value || "").trim();
  const out = $("#tokOut");
  if (!raw || !out) return;
  const tokens = raw.split("\n").map((s) => s.trim()).filter(Boolean);
  try {
    const r = await api("/tokens/inspect", { method: "POST", body: JSON.stringify({ tokens }) });
    if (r.error) { out.innerHTML = `<div class="placeholder">${esc(r.error)}</div>`; return; }
    const chainLine = r.links.length > 1
      ? `<div class="pager">chain linkage: ${r.chain_linked ? '<span class="ok">intact</span>' : '<span class="bad">broken</span>'}</div>`
      : "";
    out.innerHTML = r.links.map((l, i) => {
      const badges = `${l.rooted ? pill("root", "gold") : pill("child", "neutral")}${l.expired ? pill("expired", "bad") : ""}${l.revoked ? pill("revoked", "bad") : ""}${!l.parent_linked ? pill("unlinked", "bad") : ""}`;
      return card(`Link ${i + 1} · ${esc(l.scope)}`, `<div class="kv">
        <div class="k">Issuer</div><div class="v"><span class="fp">${esc(l.issuer_fingerprint)}</span></div>
        <div class="k">Subject</div><div class="v mono">${esc(l.subject)}</div>
        <div class="k">Caps</div><div class="v">${capChips(l.caps)}</div>
        <div class="k">Epoch</div><div class="v mono">${l.epoch}</div>
        <div class="k">Expiry</div><div class="v">${l.expiry ? `<span class="mono">${when(l.expiry * 1000)}</span>` : '<span class="dim">none</span>'} ${l.expired ? '<span class="bad">expired</span>' : ''}</div>
        <div class="k">Status</div><div class="v">${badges}</div>
        <div class="k">Hash</div><div class="v"><span class="fp">${esc(l.token_hash)}</span></div>
      </div>`);
    }).join("") + chainLine;
  } catch (e) { out.innerHTML = `<p class="err">${esc(e.message)}</p>`; }
}

/// The DM lookup opens the conversation's own detail page (Overview +
/// Messages), so a DM is a first-class entity like a user or channel rather
/// than a result pane.
async function browseDm(aArg, bArg) {
  const a = (aArg || $("#dmA")?.value || "").trim();
  const b = (bArg || $("#dmB")?.value || "").trim();
  if (!a || !b) return;
  try { await openDm(a, b); }
  catch (e) { const t = $("#msgs"); if (t) t.innerHTML = `<p class="err">${esc(e.message)}</p>`; }
}

async function browse(chanArg) {
  const chan = (chanArg || $("#chan")?.value || "").trim();
  if (!chan) return;
  if ($("#chan")) $("#chan").value = chan;
  refresh = () => browse(chan);
  try {
    const msgs = await api("/channels/" + encodeURIComponent(chan) + "/messages?limit=100");
    const target = $("#msgs");
    if (target) target.innerHTML = msgs.length ? msgs.map((m) => msgCard(m)).join("") : `<div class="placeholder">No messages.</div>`;
  } catch (e) { const t = $("#msgs"); if (t) t.innerHTML = `<p class="err">${esc(e.message)}</p>`; }
}

async function doModerate() {
  const body = { verb: $("#mVerb").value, scope: $("#mScope").value.trim(), account: $("#mAcct").value.trim(), reason: $("#mReason").value.trim() || null };
  if (!body.scope || !body.account) return;
  try { await api("/moderation", { method: "POST", body: JSON.stringify(body) }); go("moderation"); }
  catch (e) { alert(e.message); }
}

// One delegated click handler (survives innerHTML swaps). --------------------
const clicks = {
  report: (el) => openReport(el.dataset.id),
  user: (el) => openUser(el.dataset.id),
  channel: (el) => openChannel(el.dataset.id),
  peer: (el) => openPeer(el.dataset.id),
  back: (el) => go(el.dataset.x),
  resolve: async (el) => { await api(`/reports/${encodeURIComponent(el.dataset.id)}/resolve`, { method: "POST", body: JSON.stringify({ action: el.dataset.x }) }); go("reports"); },
  browse: () => browse(),
  browseDm: () => browseDm(),
  browseChan: (el) => { go("messages").then(() => browse(el.dataset.id)); },
  grantScope: () => screens.grants($("#gScope").value.trim() || "*"),
  inspectTokens: () => inspectTokens(),
  loadRevocations: () => screens.revocations($("#revScope").value.trim() || "*"),
  bumpRevocation: async (el) => {
    if (!confirm(`Bump the revocation epoch for "${el.dataset.id}"? This invalidates every grant and capability token issued before the new epoch. Irreversible.`)) return;
    try { await api("/revocations", { method: "POST", body: JSON.stringify({ scope: el.dataset.id }) }); screens.revocations(el.dataset.id); }
    catch (e) { alert(e.message); }
  },
  moderate: () => doModerate(),
  delUser: async (el) => {
    const name = el.dataset.id;
    // Typed-name confirmation (server also enforces `?confirm=`).
    const typed = ($("#delConfirm")?.value || "").trim();
    if (typed !== name) { alert(`Type the exact account name (“${name}”) to confirm.`); return; }
    try {
      await api(`/accounts/${encodeURIComponent(name)}?confirm=${encodeURIComponent(typed)}`, { method: "DELETE" });
      openUser(name); // re-render into the pending-deletion state
    } catch (e) { alert(e.message); }
  },
  restoreUser: async (el) => {
    try { await api(`/accounts/${encodeURIComponent(el.dataset.id)}/restore`, { method: "POST" }); openUser(el.dataset.id); }
    catch (e) { alert(e.message); }
  },
  suspendUser: async (el) => {
    if (!confirm(`Suspend "${el.dataset.id}"? They'll be blocked from authenticating and any connected devices are cut (reversible).`)) return;
    try {
      const r = await api(`/accounts/${encodeURIComponent(el.dataset.id)}/suspend`, { method: "POST" });
      if (r && r.sessions_closed) alert(`Suspended — closed ${r.sessions_closed} live session(s).`);
      openUser(el.dataset.id);
    } catch (e) { alert(e.message); }
  },
  disconnectUser: async (el) => {
    if (!confirm(`Disconnect every device of "${el.dataset.id}"? They can sign back in immediately.`)) return;
    try {
      const r = await api(`/accounts/${encodeURIComponent(el.dataset.id)}/disconnect`, { method: "POST" });
      alert(r && r.sessions_closed ? `Closed ${r.sessions_closed} live session(s).` : "No live sessions.");
      openUser(el.dataset.id);
    } catch (e) { alert(e.message); }
  },
  unsuspendUser: async (el) => {
    try { await api(`/accounts/${encodeURIComponent(el.dataset.id)}/unsuspend`, { method: "POST" }); openUser(el.dataset.id); }
    catch (e) { alert(e.message); }
  },
  delMsg: async (el) => {
    if (!confirm("Delete this message for everyone?")) return;
    try { await api("/messages/" + el.dataset.id, { method: "DELETE" }); refresh(); }
    catch (e) { alert(e.message); }
  },
  addNetblock: async () => {
    const network = $("#nbNet").value.trim(); if (!network) return;
    try { await api("/netblocks", { method: "POST", body: JSON.stringify({ network, reason: $("#nbReason").value.trim() || null }) }); go("netblocks"); }
    catch (e) { alert(e.message); }
  },
  rmNetblock: async (el) => { try { await api("/netblocks/" + encodeURIComponent(el.dataset.id), { method: "DELETE" }); go("netblocks"); } catch (e) { alert(e.message); } },
  severPeer: async (el) => { try { await api("/netblocks", { method: "POST", body: JSON.stringify({ network: el.dataset.id, reason: "severed via peer detail" }) }); openPeer(el.dataset.id); } catch (e) { alert(e.message); } },
  reweavePeer: async (el) => { try { await api("/netblocks/" + encodeURIComponent(el.dataset.id), { method: "DELETE" }); openPeer(el.dataset.id); } catch (e) { alert(e.message); } },
  blockMedia: async () => {
    const hash = $("#mbHash").value.trim(); if (!hash) return;
    try { await api("/media-blocks", { method: "POST", body: JSON.stringify({ hash, reason: $("#mbReason").value.trim() || null }) }); go("media"); }
    catch (e) { alert(e.message); }
  },
  unblockMedia: async (el) => { try { await api("/media-blocks/" + encodeURIComponent(el.dataset.id), { method: "DELETE" }); go("media"); } catch (e) { alert(e.message); } },
  // WC7 room actions.
  freezeChan: async (el) => { try { await api(`/channels/${encodeURIComponent(el.dataset.id)}/freeze`, { method: "POST" }); refresh(); } catch (e) { alert(e.message); } },
  unfreezeChan: async (el) => { try { await api(`/channels/${encodeURIComponent(el.dataset.id)}/unfreeze`, { method: "POST" }); refresh(); } catch (e) { alert(e.message); } },
  delChan: async (el) => {
    const typed = ($("#chanDelConfirm")?.value || "").trim();
    if (typed !== el.dataset.id) { alert(`Type the exact channel name (${el.dataset.id}) to confirm.`); return; }
    if (!confirm(`Delete ${el.dataset.id} and its stored messages? This cannot be undone.`)) return;
    try { await api(`/channels/${encodeURIComponent(el.dataset.id)}?confirm=${encodeURIComponent(typed)}`, { method: "DELETE" }); go("channels"); }
    catch (e) { alert(e.message); }
  },
  freezeNs: async (el) => {
    if (!confirm(`Full-freeze "${el.dataset.id}"? Every channel locks — only the namespace owner and network operators can post, not delegated ns-admins.`)) return;
    try { await api(`/namespaces/${encodeURIComponent(el.dataset.id)}/freeze`, { method: "POST" }); go("namespaces"); }
    catch (e) { alert(e.message); }
  },
  unfreezeNs: async (el) => { try { await api(`/namespaces/${encodeURIComponent(el.dataset.id)}/unfreeze`, { method: "POST" }); go("namespaces"); } catch (e) { alert(e.message); } },
  // Sub-page switch on an entity detail page.
  tab: (el) => { TAB[el.dataset.x] = el.dataset.id; refresh(); },
  ns: (el) => openNs(el.dataset.id),
  dm: (el) => openDm(el.dataset.id, el.dataset.x),
  kickFrom: async (el) => {
    if (!confirm(`Kick ${el.dataset.x} from ${el.dataset.id}?`)) return;
    try {
      await api("/moderation", { method: "POST", body: JSON.stringify({ verb: "kick", scope: el.dataset.id, account: el.dataset.x }) });
      refresh();
    } catch (e) { alert(e.message); }
  },
  // Scoped moderation from an entity page: the scope comes from the entity.
  modUser: (el) => applyMod(el.dataset.x, "*", el.dataset.id, $("#uModReason")),
  modChan: (el) => applyMod(el.dataset.x, el.dataset.id, ($("#cModAcct")?.value || "").trim(), $("#cModReason")),
  modNs: (el) => applyMod(el.dataset.x, "ns:" + el.dataset.id, ($("#nsModAcct")?.value || "").trim(), $("#nsModReason")),
  nsVis: async (el) => {
    try { await api(`/namespaces/${encodeURIComponent(el.dataset.id)}/visibility`, { method: "POST", body: JSON.stringify({ visibility: $("#nsVis").value }) }); refresh(); }
    catch (e) { alert(e.message); }
  },
  nsFed: async (el) => {
    try { await api(`/namespaces/${encodeURIComponent(el.dataset.id)}/federation`, { method: "POST", body: JSON.stringify({ mode: el.dataset.x }) }); refresh(); }
    catch (e) { alert(e.message); }
  },
  nsTakeover: async (el) => {
    const owner = ($("#nsTakeover")?.value || "").trim();
    if (!owner) { alert("Name the account to hand the namespace to."); return; }
    if (!confirm(`Seize "${el.dataset.id}" and hand it to ${owner}?\n\nThis applies immediately, rotates the root key, and is permanently recorded as operator-initiated. It cannot be undone by the current owner.`)) return;
    try {
      await api(`/namespaces/${encodeURIComponent(el.dataset.id)}/takeover`, { method: "POST", body: JSON.stringify({ new_owner: owner }) });
      refresh();
    } catch (e) { alert(e.message); }
  },
  selectAllReports: () => {
    const boxes = [...document.querySelectorAll(".repBox")];
    const allOn = boxes.every((b) => b.checked);
    boxes.forEach((b) => (b.checked = !allOn)); // second click clears
  },
  bulkResolve: async () => {
    const ids = [...document.querySelectorAll(".repBox")].filter((b) => b.checked).map((b) => b.value);
    if (!ids.length) { alert("Select some reports first."); return; }
    const action = $("#bulkAction").value;
    if (!confirm(`Resolve ${ids.length} report(s) as "${action}"?`)) return;
    try {
      const r = await api("/reports/bulk-resolve", { method: "POST", body: JSON.stringify({ ids, action, note: ($("#bulkNote").value || "").trim() || null }) });
      const missed = (r.unchanged || []).length;
      alert(`Resolved ${(r.resolved || []).length}${missed ? ` — ${missed} unchanged (already resolved or gone)` : ""}.`);
      go("reports");
    } catch (e) { alert(e.message); }
  },
  saveScopes: async (el) => {
    const scopes = [...document.querySelectorAll(".permBox")].filter((b) => b.checked).map((b) => b.value);
    try {
      await api(`/accounts/${encodeURIComponent(el.dataset.id)}/admin-scopes`, { method: "POST", body: JSON.stringify({ scopes }) });
      refresh();
    } catch (e) { alert(e.message); }
  },
  promote: async (el) => {
    if (!confirm(`Promote ${el.dataset.id} to operator? Operators hold every admin scope and can change other accounts' permissions.`)) return;
    try { await api(`/accounts/${encodeURIComponent(el.dataset.id)}/operator`, { method: "POST" }); refresh(); }
    catch (e) { alert(e.message); }
  },
  demote: async (el) => {
    if (!confirm(`Remove operator status from ${el.dataset.id}?`)) return;
    try { await api(`/accounts/${encodeURIComponent(el.dataset.id)}/unoperator`, { method: "POST" }); refresh(); }
    catch (e) { alert(e.message); }
  },
};
main().addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (el && clicks[el.dataset.action]) { e.preventDefault(); clicks[el.dataset.action](el); }
});

// WC2 permission picker: keep the row highlight in sync, and mirror the server's
// rule that `admin.read` rides along with any other scope (it's the panel
// baseline — a set without it could not sign in).
main().addEventListener("change", (e) => {
  const box = e.target.closest(".permBox");
  if (!box) return;
  const all = [...document.querySelectorAll(".permBox")];
  const read = all.find((b) => b.dataset.baseline);
  if (read) {
    const others = all.some((b) => b !== read && b.checked);
    if (others) { read.checked = true; read.disabled = true; }
    else { read.disabled = false; }
  }
  all.forEach((b) => b.closest(".perm").classList.toggle("on", b.checked));
});

// Sidebar (grouped nav, mirrors design/admin/layout.html) --------------------
const NAV = [
  { label: "", items: [["dash", "Dashboard"]] },
  { label: "Lookup", items: [["users", "Users"], ["channels", "Channels"], ["namespaces", "Namespaces"], ["messages", "Messages"]] },
  { label: "Federation", items: [["peers", "Peers"], ["netblocks", "Netblocks"], ["transit", "Transit Queue", "WC5"], ["remoteChannels", "Remote Channels", "WC5"]] },
  { label: "Trust & Keys", items: [["grants", "Grants"], ["tokens", "Capability Tokens"], ["revocations", "Revocations"], ["devices", "Devices", "WC6"]] },
  { label: "Moderation", items: [["reports", "Reports"], ["moderation", "Moderation"], ["media", "Media Blocklist"], ["phraseBans", "Phrase Bans", "WC7"]] },
  { label: "Access", items: [["admins", "Permissions"]] },
  { label: "Gateways", items: [["irc", "IRC Bridge", "WC8"]] },
  { label: "Observability", items: [["audit", "Audit Log"], ["transport", "QUIC Transport", "WC9"]] },
];
function buildNav() {
  $("#nav").innerHTML = NAV.map((g) =>
    `<div class="nav-group">${g.label ? `<div class="nav-label">${g.label}</div>` : ""}` +
    g.items.map(([view, label, soon]) =>
      `<button class="nav-item ${soon ? "soon" : ""}" data-view="${view}"><span class="tick">─</span>${label}${soon ? `<span class="soon-tag">${soon}</span>` : ""}</button>`).join("") +
    `</div>`).join("");
  $("#nav").addEventListener("click", (e) => { const b = e.target.closest("[data-view]"); if (b) go(b.dataset.view); });
}

// Nav + auth ----------------------------------------------------------------
let WHO = { account: "", network: "" };
/// True operator authority — gates the permission-management controls.
let IS_OPERATOR = false;
async function go(name) {
  document.querySelectorAll("#nav [data-view]").forEach((b) => b.classList.toggle("active", b.dataset.view === name));
  try { await screens[name](); } catch (e) { set(`<p class="err">${esc(e.message)}</p>`); }
}

const showLogin = () => { $("#side").classList.add("hidden"); $("#app").classList.add("hidden"); $("#login").classList.remove("hidden"); };
const showApp = () => { $("#login").classList.add("hidden"); $("#side").classList.remove("hidden"); $("#app").classList.remove("hidden"); };

$("#loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("#loginErr").textContent = "";
  try {
    await api("/login", { method: "POST", body: JSON.stringify({ account: $("#acct").value.trim(), password: $("#pw").value }) });
    await start();
  } catch { $("#loginErr").textContent = "Sign-in failed."; }
});
$("#logout").addEventListener("click", async () => { try { await api("/logout", { method: "POST" }); } catch {} showLogin(); });

async function start() {
  try {
    WHO = await api("/me");
    SCOPES = WHO.scopes || [];
    $("#opName").textContent = WHO.account;
    $("#opAddr").textContent = `${WHO.account}@${WHO.network}`;
    // Operators show the OPERATOR pill; a delegated admin shows its held scopes
    // instead, so it's clear what this session can do. `operator` is the real
    // flag — a delegated `admin.*` grant holds every scope but is not one.
    IS_OPERATOR = !!WHO.operator;
    $("#role").innerHTML = IS_OPERATOR
      ? `<span class="op-role">Operator</span>`
      : SCOPES.map((s) => `<span class="pill gold">${esc(s.replace("admin.", ""))}</span>`).join(" ");
    buildNav();
    showApp(); go("dash");
  } catch { showLogin(); }
}
start();
